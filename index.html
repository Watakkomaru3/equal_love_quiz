<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:system-ui,sans-serif;
  background:#f4f6ff;
  color:#222;
}

/* ======================
   PCレイアウト
====================== */

.wrapper{
  max-width:1400px;
  margin:auto;
  padding:24px;
}

h1{
  margin-top:0;
  font-size:34px;
}

.main-grid{
  display:grid;
  grid-template-columns: 1fr 650px;
  gap:24px;
  align-items:start;
}

/* ======================
   左側
====================== */

.left-panel{
  background:white;
  border-radius:20px;
  padding:24px;
  box-shadow:0 4px 16px rgba(0,0,0,0.08);
}

.input-row{
  display:flex;
  gap:10px;
  margin-bottom:18px;
}

#answer{
  flex:1;
  font-size:18px;
  padding:14px;
  border-radius:12px;
  border:1px solid #ccc;
}

button{
  border:none;

  border-radius:14px;

  padding:14px 18px;

  font-size:15px;
  font-weight:bold;

  cursor:pointer;

  background:#6f7cff;
  color:white;

  transition:0.2s;

  white-space:nowrap;
}

button:hover{
  opacity:.85;
}

.hint-buttons{
  margin-top:20px;

  display:grid;

  grid-template-columns:
    repeat(3, 1fr);

  gap:12px;
}

#result{
  margin-top:16px;
  font-weight:bold;
  min-height:60px;
}

.ok{
  color:#0a7a2f;
}

.ng{
  color:#c00;
}

.score-box{
  margin-top:16px;
  padding:12px;
  background:#eef2ff;
  border-radius:12px;
  font-size:18px;
  font-weight:bold;
}

#hint-area{
  margin-top:18px;
  background:#fff8df;
  border-radius:12px;
  padding:16px;
  min-height:120px;
  line-height:1.8;
  font-weight:bold;
}

/* ======================
   画像エリア
====================== */

.right-panel{
  position:sticky;
  top:20px;
}

.image-card{
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 4px 16px rgba(0,0,0,0.08);
}

#image-area{
  width:100%;
  max-width:620px;
  border-radius:20px;
  box-shadow:0 8px 24px rgba(0,0,0,0.25);
  text-align:center;
}

#image-area img{
  width:100%;
  max-width:620px;
  max-height:80vh;

  object-fit:contain;

  border-radius:20px;

  box-shadow:
    0 10px 30px rgba(0,0,0,0.25);

  transition:0.3s;
}

.audio-player{

  margin-top:18px;

  padding:16px;

  background:#f0f3ff;

  border-radius:16px;

}

#now-playing{

  font-weight:bold;

  margin-bottom:12px;

  font-size:15px;

}

.audio-buttons{

  display:grid;

  grid-template-columns:
    repeat(3, 1fr);

  gap:12px;

}

.audio-buttons button{

  width:100%;

  padding:14px 10px;

  font-size:15px;

}

/* ======================
   正解一覧
====================== */

.correct-section{
  margin-top:24px;
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 4px 16px rgba(0,0,0,0.08);
}

#correct-list{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.correctItem{
  padding:8px 12px;
  background:#e6ffe6;
  border-radius:999px;
  font-size:14px;
  font-weight:bold;
}

#remaining-count{
  font-size:18px;
  font-weight:bold;
}

/* ======================
   スマホ対応
====================== */

@media(max-width:900px){

  .main-grid{
    grid-template-columns:1fr;
  }

  .right-panel{
    position:static;
  }

  .input-row{
    flex-direction:column;
  }

  button{
    width:100%;
  }

  .audio-buttons{

    grid-template-columns:1fr;

  }

}

</style>
</head>

// ======================
// 状態管理
// ======================

let startTime = null;

let timerInterval = null;

const correctSet = new Set();

document.getElementById("total").textContent =
  allSongs.length;

// ======================
// 正規化
// ======================

function normalize(text){

  return text
    .toLowerCase()
    .replace(/\s/g,"")
    .replace(/[！!]/g,"!")
    .replace(/[？?]/g,"?")
    .replace(/[、,]/g,"")
    .replace(/[・]/g,"");

}

// ======================
// ゲーム開始
// ======================

let gameStarted = false;

function startGame(){

  if(gameStarted) return;

  gameStarted = true;

  startTime = Date.now();

  timerInterval =
    setInterval(updateTimer,1000);

  const answer =
    document.getElementById("answer");

  answer.disabled = false;

  answer.placeholder =
    "曲名を入力";

  answer.focus();

}

function resetGame(){

// タイマー停止
clearInterval(timerInterval);

// タイマー初期化
startTime = null;

timerInterval = null;

// ゲーム未開始へ
gameStarted = false;

// 正解データ削除
correctSet.clear();

// スコア更新
updateScore();

updateRemaining();

// 正解一覧削除
document.getElementById("correct-list")
  .innerHTML = "";

// 結果表示削除
document.getElementById("result")
  .innerHTML = "";

// ヒント削除
document.getElementById("hint-area")
  .innerHTML = "";

// タイマー表示初期化
document.getElementById("timer")
  .textContent = "0:00";

// 入力欄初期化
const answer =
  document.getElementById("answer");

answer.value = "";

answer.disabled = true;

answer.placeholder =
  "開始ボタンを押してください";

// 画像削除
document.getElementById("image-area")
  .innerHTML = "";

// ヒント曲リセット
currentHintSong = null;

openedHints = [];

// 音楽停止
stopSong();

}


// ======================
// 回答チェック
// ======================

function checkAnswer(){

  const input =
    document.getElementById("answer");

  const value = normalize(input.value);

  if(!value) return;

  let found = null;

  let duplicated = false;

  for(const song of allSongs){

    const candidates =
      [song.title,...song.aliases];

    for(const name of candidates){

      if(normalize(name) === value){

        if(correctSet.has(song.title)){

          duplicated = true;
          
        }else{

          found = song;

        }

        break;

      }

    }

    if(found || duplicated) break;
  }

  const result =
    document.getElementById("result");

  if(found){

    correctSet.add(found.title);

    result.innerHTML = `
      正解！<br>

      <div style="
        font-size:14px;
        color:inherit;
        margin-bottom:6px;
        font-weight:bold;
        ">
        ${found.hint2}  ${found.type}
      </div>

      <span style="
        font-size:30px;
        font-weight:bold;
      ">
        「${found.title}」
      </span>
      `;

    result.className = "ok";

    addCorrect(found.title);

    updateScore();

    updateRemaining();

    showImage(found.image);

    playSong(found.audio,found.title);

    currentHintSong = null;
    openedHints = [];

    document.getElementById("hint-area")
      .innerHTML = "";

    if(correctSet.size === allSongs.length){

      const endTime = Date.now();

      const seconds = Math.floor((endTime - startTime) / 1000);
      
      const minutes = Math.floor(seconds / 60);

      const remainSeconds = seconds % 60;

      clearInterval(timerInterval);

      alert(
        "全問正解！！\n\n" +
        "クリアタイム：" +
        minutes + "分 " +
        remainSeconds + "秒"
      );

      document.getElementById("answer")
        .disabled = true;

      gameStarted = false;

    }

  }else if(duplicated){

    result.textContent = "その曲は既に正解しています";

    result.className = "ng";

  }else{

    result.textContent = "不正解！";

    result.className = "ng";

  }

  input.value = "";

  input.focus();

}

// ======================
// 正解表示
// ======================

function addCorrect(title){

  const div = document.createElement("div");

  div.className = "correctItem";

  div.textContent = title;

  document.getElementById("correct-list")
    .appendChild(div);

}

// ======================
// スコア更新
// ======================

function updateScore(){

  document.getElementById("score")
    .textContent = correctSet.size;

}

// ======================
// 残り曲数
// ======================

function updateRemaining(){

  document.getElementById("remaining-count")
    .textContent =
      "残り " +
      (allSongs.length - correctSet.size) +
      " 曲";

}

function updateTimer(){

  if(startTime === null) return;

  const now = Date.now();

  const seconds =
    Math.floor((now - startTime) / 1000);

  const minutes =
    Math.floor(seconds / 60);

  const remainSeconds =
    seconds % 60;

  document.getElementById("timer")
    .textContent =
      minutes + ":" +
      String(remainSeconds).padStart(2,"0");

}

// ======================
// ヒント
// ======================

let currentHintSong = null;

let openedHints = [];

function showHint(level){

  const remaining =
    allSongs.filter(
      s=>!correctSet.has(s.title)
    );

  if(remaining.length === 0){

    document.getElementById("hint-area")
      .textContent = "全問正解！";

    return;
  }

  if(!currentHintSong){

    currentHintSong =
      remaining[
        Math.floor(
          Math.random()*remaining.length
        )
      ];

    openedHints = [];

  }

  if(!openedHints.includes(level)){

    openedHints.push(level);

  }

  let html = "";

  if(openedHints.includes(1)){

    html += "【ヒント1】<br>";
    html += currentHintSong.hint1 + "<br><br>";

  }

  if(openedHints.includes(2)){

    html += "【ヒント2】<br>";
    html += currentHintSong.hint2 + "<br><br>";

  }

  if(openedHints.includes(3)){

    html += "【ヒント3】<br>";
    html += currentHintSong.hint3;

  }

  document.getElementById("hint-area")
    .innerHTML = html;

}

// ======================
// Enter送信
// ======================

document.getElementById("answer")
.addEventListener("keydown",e=>{

  if(e.key==="Enter"){

    checkAnswer();

  }

});

// ======================
// 初期表示
// ======================

updateRemaining();

// ======================
// 音楽再生
// ======================

let currentAudio = null;

let currentSongTitle = "";

let stopTimer = null;

function playSong(src,title){

  // 前の曲停止
  if(currentAudio){

    currentAudio.pause();

    currentAudio.currentTime = 0;

  }

  // タイマー解除
  if(stopTimer){

    clearTimeout(stopTimer);

  }

  currentAudio = new Audio(src);

  currentSongTitle = title;

  document.getElementById("now-playing")
    .textContent =
      "再生中：" + title;

  currentAudio.play();

  // 50秒停止
  stopTimer = setTimeout(()=>{

    stopSong();

  },50000);

}
// ======================
// 画像表示
// ======================

function showImage(src){

  const area =
    document.getElementById("image-area");

  area.innerHTML = `
    <img src="${src}" alt="ジャケット画像">
  `;

}

function pauseSong(){

  if(currentAudio){

    currentAudio.pause();

  }

}

function resumeSong(){

  if(currentAudio){

    currentAudio.play();

    document.getElementById("now-playing")
      .textContent =
      "再生中：" + currentSongTitle;

  }

}

function stopSong(){

  if(currentAudio){

    currentAudio.pause();

    currentAudio.currentTime = 0;

  }

  if(stopTimer){
  clearTimeout(stopTimer);
  }

  document.getElementById("now-playing")
    .textContent =
      "再生中：なし";

}

</script>
